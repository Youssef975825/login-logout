<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login,Logout</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>
    
    <div id="wrapper">

<form action="" class="login">


    <h1>Login</h1>

<section class="data">
    <div class="input_box">

        <input type="text" class="username" required name="user_name" placeholder="UserName">
            <i class='bx bxs-user'></i>

    </div>
<div class="input_box">

    <input type="password" class="password" required name="password" placeholder="Password">
        <i class='bx bxs-lock-alt'></i>

</div>
<div class="remember-forget">

    <label for="remember_me"> <input type="checkbox" name="remember_me" class="remember_me">
Remember me</label>

    <a href="#">Forget Password</a>

</div>

    <button type="submit" class="btn">Login</button>


<div class="register-link">

    <p>Don't Have an account? <a href="#">Register</a></p> 

</div>

</section>

</form>

    </div>



</body>
</html>
